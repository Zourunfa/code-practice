<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <style>
      .addToCart {
        width: 36px;
        height: 36px;
        border-radius: 50%;
        top: 100px;
        left: 100px;
        position: absolute;
        background: #0f79b9;
        font-size: 30px;
        color: #fff;
        font-weight: bolder;
        line-height: 32px;
        text-align: center;
        cursor: pointer;
        z-index: 10;
      }
      .addToCart span {
        -webkit-user-select: none;
        -moz-user-select: none;
        -ms-user-select: none;
        user-select: none;
      }

      .outer {
        z-index: 9;
        top: 100px;
        left: 100px;
        position: absolute;
        transition: -webkit-transform 1s linear;
        transition: transform 1s linear;
        transition: transform 1s linear, -webkit-transform 1s linear;
      }
      .outer .inner {
        border-radius: 50%;
        width: 36px;
        height: 36px;
        top: 0;
        left: 0;
        position: absolute;
        background: #e0c01b;
        opacity: 1;
        transition: all 1s cubic-bezier(0.29, -0.48, 0.99, 0.19);
      }
      .shopCart {
        width: 100px;
        height: 40px;
        line-height: 40px;
        border-radius: 5px;
        background: #35b317;
        color: #fff;
        text-align: center;
        position: absolute;
        right: 100px;
        bottom: 100px;
      }
    </style>
    <title>跳水动画示例</title>
  </head>
  <body>
    <div class="addToCart">
      <span>+</span>
    </div>

    <div class="outer">
      <div class="inner"></div>
    </div>
    <div class="shopCart">
      <span>Cart</span>
    </div>
  </body>
</html>
