    function toSum(arr, target) {
      let res = []
      let map = new Map()
      for (let i = 0; i < arr.length; i++) {
        let diff = target - arr[i]
        if (map.has(diff)) {
          return [diff, arr[i]]
        } else {
          map.set(arr[i], i)
        }
      }
      return []
    }
